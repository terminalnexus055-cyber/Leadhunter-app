<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadHunter AI — Find Ready Buyers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a06;
  --bg2: #080f09;
  --surface: #0d1a0e;
  --surface2: #122214;
  --surface3: #172a19;
  --border: #1e3320;
  --border2: #254028;
  --primary: #22c55e;
  --primary-dark: #16a34a;
  --primary-glow: rgba(34,197,94,0.12);
  --primary-dim: rgba(34,197,94,0.06);
  --accent: #4ade80;
  --accent2: #86efac;
  --gold: #fbbf24;
  --gold-glow: rgba(251,191,36,0.1);
  --red: #ef4444;
  --red-glow: rgba(239,68,68,0.1);
  --blue: #60a5fa;
  --text: #f0fdf4;
  --text2: #86efac;
  --text3: #4d7c5a;
  --muted: #2d5235;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.7);
  --glow: 0 0 40px rgba(34,197,94,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BACKGROUND ─────────────────────────────── */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.12;
  animation: drift 15s ease-in-out infinite;
}
.bg-orb:nth-child(1) { width:500px; height:500px; background:#22c55e; top:-150px; right:-100px; animation-delay:0s; }
.bg-orb:nth-child(2) { width:350px; height:350px; background:#16a34a; bottom:5%; left:-100px; animation-delay:-5s; }
.bg-orb:nth-child(3) { width:250px; height:250px; background:#fbbf24; bottom:25%; right:5%; animation-delay:-10s; opacity:0.06; }
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(34,197,94,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
}
.bg-scan {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(34,197,94,0.01) 2px,
    rgba(34,197,94,0.01) 4px
  );
}
@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(20px,-30px) scale(1.08); }
  66% { transform: translate(-25px,20px) scale(0.94); }
}

/* ── APP ────────────────────────────────────── */
.app {
  position: relative;
  z-index: 1;
  max-width: 500px;
  margin: 0 auto;
  padding: 16px 16px 100px;
}

/* ── HEADER ─────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 28px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  box-shadow: 0 0 24px rgba(34,197,94,0.4);
  position: relative;
}
.logo-icon::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 14px;
  border: 1px solid rgba(34,197,94,0.3);
}
.logo-text {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}
.logo-text span { color: var(--primary); }
.logo-sub {
  font-size: 0.58rem;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: -2px;
  font-family: 'DM Mono', monospace;
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--primary-dim);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--primary);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--primary);
  box-shadow: 0 0 8px rgba(34,197,94,0.6);
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── SCREENS ────────────────────────────────── */
.screen { display:none; animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1); }
.screen.active { display:block; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}

/* ── CARDS ──────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(34,197,94,0.25), transparent);
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  flex-shrink: 0;
  background: var(--primary-dim);
  border: 1px solid rgba(34,197,94,0.15);
}

/* ── FORMS ──────────────────────────────────── */
label {
  display: block;
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--text3);
  margin-bottom: 6px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}
input, textarea, select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  padding: 12px 14px;
  margin-bottom: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(34,197,94,0.08);
}
select option { background: var(--surface2); color: var(--text); }
textarea { resize: vertical; min-height: 80px; }
input::placeholder, textarea::placeholder { color: var(--text3); }

/* ── TOGGLE ─────────────────────────────────── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
}
.toggle-label { font-size: 0.82rem; font-weight: 600; color: var(--text2); }
.toggle-sub { font-size: 0.68rem; color: var(--text3); margin-top: 2px; }
.toggle {
  position: relative;
  width: 44px; height: 24px;
  flex-shrink: 0;
}
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--text3);
  top: 2px; left: 2px;
  transition: all 0.3s;
}
.toggle input:checked + .toggle-slider { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px rgba(34,197,94,0.3); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); background: white; }

/* ── BUTTONS ────────────────────────────────── */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: 10px;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  letter-spacing: 0.5px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #050a06;
  box-shadow: 0 4px 20px rgba(34,197,94,0.3);
}
.btn-primary:hover { box-shadow: 0 6px 28px rgba(34,197,94,0.5); transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  margin-top: 8px;
}
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text3);
  padding: 10px 16px;
  font-size: 0.78rem;
  width: auto;
}
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger {
  background: var(--red-glow);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--red);
  margin-top: 8px;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

/* ── SPINNER ────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 15px; height: 15px;
  border: 2px solid rgba(5,10,6,0.3);
  border-top-color: #050a06;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ── HUNTING ANIMATION ──────────────────────── */
.hunting-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 20px;
  text-align: center;
  margin-bottom: 12px;
}
.hunting-icon {
  font-size: 3rem;
  display: block;
  margin-bottom: 16px;
  animation: hunt 1s ease-in-out infinite alternate;
}
@keyframes hunt { from{transform:translateX(-8px)} to{transform:translateX(8px)} }
.hunting-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 8px;
}
.hunting-steps { display:flex; flex-direction:column; gap:8px; margin-top:20px; }
.hunting-step {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text3);
  text-align: left;
}
.hunting-step.active { border-color: var(--primary); color: var(--primary); background: var(--primary-dim); }
.hunting-step.done { border-color: rgba(34,197,94,0.2); color: var(--accent2); }
.step-icon-sm { width:20px; height:20px; border-radius:50%; border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:0.6rem; flex-shrink:0; }
.hunting-step.done .step-icon-sm { background:var(--primary); border-color:var(--primary); color:#050a06; }
.hunting-step.active .step-icon-sm { background:var(--primary-dim); border-color:var(--primary); color:var(--primary); animation: pulse-sm 1s infinite; }
@keyframes pulse-sm { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{box-shadow:0 0 0 4px rgba(34,197,94,0)} }
.progress-track { height:4px; background:var(--surface3); border-radius:2px; margin-top:16px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:2px; transition:width 0.6s ease; box-shadow: 0 0 8px rgba(34,197,94,0.4); }

/* ── LEAD CARDS ─────────────────────────────── */
.leads-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.leads-count {
  font-family: 'Syne', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--primary);
}
.leads-list { display:flex; flex-direction:column; gap:10px; }

.lead-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  transition: border-color 0.2s;
}
.lead-card:hover { border-color: var(--border2); }
.lead-card.hot { border-color: rgba(251,191,36,0.25); }
.lead-card.warm { border-color: rgba(34,197,94,0.2); }
.lead-card.cold { border-color: var(--border); }

.lead-top-bar {
  height: 3px;
  width: 100%;
}
.lead-card.hot .lead-top-bar { background: linear-gradient(90deg, var(--gold), #f59e0b); }
.lead-card.warm .lead-top-bar { background: linear-gradient(90deg, var(--primary), var(--accent)); }
.lead-card.cold .lead-top-bar { background: var(--border2); }

.lead-body { padding: 16px; }
.lead-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.lead-grade {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 700;
}
.grade-pill {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.grade-hot { background: var(--gold-glow); border:1px solid rgba(251,191,36,0.25); color: var(--gold); }
.grade-warm { background: var(--primary-dim); border:1px solid rgba(34,197,94,0.2); color: var(--primary); }
.grade-cold { background: var(--surface2); border:1px solid var(--border2); color: var(--text3); }

.lead-score-bar {
  display: flex;
  align-items: center;
  gap: 6px;
}
.score-label { font-size:0.62rem; color:var(--text3); font-family:'DM Mono',monospace; }
.score-dots { display:flex; gap:3px; }
.score-dot { width:8px; height:8px; border-radius:2px; background:var(--surface3); }
.score-dot.filled.hot { background: var(--gold); }
.score-dot.filled.warm { background: var(--primary); }
.score-dot.filled.cold { background: var(--text3); }

.lead-username {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--primary);
  font-weight: 500;
  margin-bottom: 4px;
}
.lead-sub { font-size:0.65rem; color:var(--text3); font-weight:600; margin-bottom:10px; }
.lead-need {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 10px;
}
.lead-quote {
  background: var(--surface2);
  border-left: 2px solid var(--primary);
  border-radius: 4px;
  padding: 8px 12px;
  font-size: 0.75rem;
  color: var(--text2);
  font-style: italic;
  line-height: 1.5;
  margin-bottom: 12px;
}
.lead-actions { display:flex; gap:8px; flex-wrap:wrap; }
.lead-btn {
  flex: 1;
  padding: 9px 12px;
  border-radius: 8px;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  min-width: 100px;
}
.lead-btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #050a06;
}
.lead-btn-secondary {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
}
.lead-btn:hover { transform: translateY(-1px); }

.outreach-box {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.outreach-box.show { display:block; }
.outreach-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 12px;
  margin-bottom: 8px;
  outline: none;
  resize: vertical;
  min-height: 120px;
  line-height: 1.6;
}
.outreach-textarea:focus { border-color: var(--primary); }
.outreach-actions { display:flex; gap:8px; }
.copy-btn {
  flex: 1;
  padding: 9px;
  border-radius: 8px;
  border: 1px solid rgba(34,197,94,0.2);
  background: var(--primary-dim);
  color: var(--primary);
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.copy-btn:hover { background: var(--primary); color: #050a06; }
.regen-btn {
  padding: 9px 14px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text3);
  font-family: 'Syne', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

/* ── MARKET TRENDS ──────────────────────────── */
.trend-grid { display:flex; flex-direction:column; gap:8px; }
.trend-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.trend-rank {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text3);
  min-width: 20px;
}
.trend-text { font-size:0.8rem; font-weight:600; color:var(--text); flex:1; }
.trend-bar-wrap { width:60px; }
.trend-bar { height:4px; background:var(--surface3); border-radius:2px; overflow:hidden; }
.trend-bar-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:2px; }
.trend-score { font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--primary); min-width:28px; text-align:right; }

.demand-meter {
  text-align: center;
  padding: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
}
.demand-number {
  font-family: 'Syne', sans-serif;
  font-size: 3rem;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
  text-shadow: 0 0 30px rgba(34,197,94,0.3);
}
.demand-label { font-size:0.72rem; color:var(--text3); font-weight:600; margin-top:4px; letter-spacing:1px; text-transform:uppercase; font-family:'DM Mono',monospace; }
.demand-desc { font-size:0.82rem; color:var(--text2); margin-top:8px; font-weight:500; }

/* ── ICP CARD ───────────────────────────────── */
.icp-grid { display:flex; flex-direction:column; gap:8px; }
.icp-item {
  display: flex;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.icp-label { font-size:0.65rem; color:var(--text3); font-weight:700; letter-spacing:1px; text-transform:uppercase; font-family:'DM Mono',monospace; min-width:80px; margin-top:2px; }
.icp-value { font-size:0.8rem; color:var(--text); font-weight:500; line-height:1.5; flex:1; }

/* ── SAVED LEADS ────────────────────────────── */
.saved-empty {
  text-align: center;
  padding: 32px 20px;
  color: var(--text3);
}
.saved-empty .empty-icon { font-size:2.5rem; display:block; margin-bottom:10px; }
.saved-empty p { font-size:0.82rem; font-weight:600; }

/* ── TABS ───────────────────────────────────── */
.nav-tabs { display:flex; gap:6px; margin-bottom:12px; }
.nav-tab {
  flex: 1;
  padding: 10px 6px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  font-size: 0.68rem;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.3px;
}
.nav-tab.active {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-dim);
  box-shadow: 0 0 12px rgba(34,197,94,0.1);
}

/* ── SKELETON ───────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton-line { height:12px; margin-bottom:8px; }
.skeleton-line.short { width:60%; }

/* ── MISC ───────────────────────────────────── */
.version-tag { text-align:center; font-size:0.6rem; color:var(--muted); margin-top:12px; font-family:'DM Mono',monospace; letter-spacing:1px; }
.divider { height:1px; background:var(--border); margin:12px 0; }
